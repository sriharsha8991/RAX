# Note: PostgreSQL is hosted on Supabase (cloud). Neo4j + Qdrant run locally.
# Set DATABASE_URL, SUPABASE_URL, SUPABASE_ANON_KEY, NEO4J_URI, NEO4J_USERNAME, NEO4J_PASSWORD in your .env file.

version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    container_name: rax_neo4j
    ports:
      - "7474:7474"    # Neo4j Browser UI
      - "7687:7687"    # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/rax_dev_password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "rax_dev_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rax_qdrant
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
